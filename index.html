<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMI · Statistiche Passeggeri</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg: #070C1B; --text: #E8EFFF; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        #app { max-width: 800px; margin: auto; }
        #loading-msg { text-align: center; font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>🛫 Statistiche Passeggeri PMI</h1>
        <div id="loading-msg">Caricamento dati in corso...</div>
        <canvas id="myChart"></canvas>
    </div>

<script>
    async function loadData() {
        try {
            // Qui punta DIRETTAMENTE al file nel tuo repository
            const response = await fetch('data/passengers.json');
            if (!response.ok) throw new Error("File non trovato");
            
            const data = await response.json();
            renderDashboard(data);
        } catch (e) {
            console.error("Errore:", e);
            document.getElementById("loading-msg").textContent = "❌ Errore: File JSON non trovato o il formato è errato.";
        }
    }

    function renderDashboard(data) {
        document.getElementById("loading-msg").style.display = 'none';
        
        // ESEMPIO DI LOGICA: trasforma il JSON {anno: {mese: valore}} in formato Chart.js
        const labels = [];
        const values = [];

        // Cicla gli anni e i mesi per riempire i dati
        Object.keys(data).sort().forEach(year => {
            Object.keys(data[year]).sort((a,b) => a-b).forEach(month => {
                labels.push(`${month}/${year}`);
                values.push(data[year][month]);
            });
        });

        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Passeggeri',
                    data: values,
                    backgroundColor: '#4F8FEE'
                }]
            },
            options: { responsive: true }
        });
    }

    loadData();
</script>
</body>
</html>
