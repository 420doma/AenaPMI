<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palma Airport Data</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-yellow: #f59e0b;
            --accent-blue: #3b82f6;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* ----- Anno Selector ----- */
        .year-selector-container {
            margin-bottom: 24px;
        }

        .year-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .year-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .year-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .year-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .year-btn.active {
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
            background-color: rgba(245, 158, 11, 0.1);
        }

        /* ----- Card Grafico ----- */
        .chart-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .chart-header {
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chart-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .legend {
            display: flex;
            gap: 16px;
            font-size: 13px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-yellow { background-color: var(--accent-yellow); }
        .dot-blue { background-color: var(--accent-blue); }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* ----- Card Totale ----- */
        .total-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-yellow);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .total-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .total-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .total-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ----- Tooltip Custom (opzionale per stile extra, ChartJS usa canvas ma possiamo personalizzarlo) ----- */
        .custom-tooltip {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 13px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }
        
        .tooltip-title {
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .tooltip-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .tooltip-color-box {
            width: 12px;
            height: 12px;
            display: inline-block;
            margin-right: 6px;
            border-radius: 2px;
        }
        
        .tooltip-color-blue { background-color: var(--accent-blue); }
        .tooltip-color-yellow { background-color: var(--accent-yellow); }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="year-selector-container">
            <span class="year-label">Anno</span>
            <div class="year-buttons" id="year-buttons">
                </div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <h2 class="chart-title">Arrivi mensili &bull; <span id="current-year"></span></h2>
                <div class="chart-subtitle" id="comparison-text">Confronto con l'anno precedente</div>
                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-dot dot-yellow"></span>
                        <span id="legend-current"></span>
                    </div>
                    <div class="legend-item" id="legend-prev-container">
                        <span class="legend-dot dot-blue"></span>
                        <span id="legend-prev"></span>
                    </div>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <div class="total-card">
            <div class="total-label">Totale Anno</div>
            <div class="total-value" id="total-value">0</div>
            <div class="total-subtitle"><span id="total-text"></span> arrivi</div>
        </div>

    </div>

    <script>
        const API_URL = 'data/data.json';
        const MONTHS = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
        
        let chartInstance = null;
        let globalData = null;

        // Formattatori
        const formatNumber = (num) => new Intl.NumberFormat('it-IT').format(num);
        const formatMillions = (num) => {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(2) + 'M';
            }
            return formatNumber(num);
        };

        // Inizializzazione
        async function init() {
            try {
                // Aggiungiamo un timestamp per evitare la cache durante lo sviluppo
                const response = await fetch(API_URL + '?t=' + new Date().getTime());
                globalData = await response.json();
                
                const years = Object.keys(globalData).sort((a, b) => a - b);
                if (years.length === 0) return;

                const defaultYear = years[years.length - 1]; // Prende l'ultimo anno disponibile
                
                buildYearButtons(years, defaultYear);
                renderDashboard(defaultYear);

            } catch (error) {
                console.error("Errore nel caricamento dei dati:", error);
                document.getElementById('total-value').innerText = "Errore";
                document.getElementById('total-text').innerText = "Impossibile caricare i dati.";
            }
        }

        function buildYearButtons(years, activeYear) {
            const container = document.getElementById('year-buttons');
            container.innerHTML = '';
            
            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = `year-btn ${year === activeYear ? 'active' : ''}`;
                btn.innerText = year;
                btn.onclick = () => {
                    // Rimuovi classe active a tutti
                    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                    // Aggiungi active al cliccato
                    btn.classList.add('active');
                    // Rendi dashboard
                    renderDashboard(year);
                };
                container.appendChild(btn);
            });
        }

        function renderDashboard(year) {
            const prevYear = (parseInt(year) - 1).toString();
            
            const currentDataRaw = globalData[year] || new Array(12).fill(0);
            const prevDataRaw = globalData[prevYear] || new Array(12).fill(0);

            // Per evitare che i mesi futuri (a 0) facciano crollare il grafico a 0, mettiamo null
            // Assumiamo che se il valore è esattamente 0 e siamo nell'anno corrente, il dato non c'è ancora.
            // (Aena non pubblica mesi a 0, tranne casi assurdi come COVID estremo, ma in genere se non c'è dato è 0)
            const currentData = currentDataRaw.map(v => v === 0 ? null : v);
            const prevData = prevDataRaw.map(v => v === 0 ? null : v);

            // Calcolo totale dell'anno selezionato
            const total = currentDataRaw.reduce((acc, val) => acc + val, 0);

            // Aggiornamento testi interfaccia
            document.getElementById('current-year').innerText = year;
            document.getElementById('legend-current').innerText = year;
            
            if (globalData[prevYear]) {
                document.getElementById('comparison-text').innerText = `Confronto con ${prevYear} (linea blu)`;
                document.getElementById('legend-prev-container').style.display = 'flex';
                document.getElementById('legend-prev').innerText = prevYear;
            } else {
                document.getElementById('comparison-text').innerText = `Nessun dato di confronto per il ${prevYear}`;
                document.getElementById('legend-prev-container').style.display = 'none';
            }

            document.getElementById('total-value').innerText = formatMillions(total);
            document.getElementById('total-text').innerText = formatNumber(total);

            updateChart(year, prevYear, currentData, prevData);
        }

        function updateChart(year, prevYear, currentData, prevData) {
            const ctx = document.getElementById('myChart').getContext('2d');

            if (chartInstance) {
                chartInstance.destroy();
            }

            const datasets = [];

            // Aggiungiamo prima l'anno precedente (Linea) così sta dietro le barre
            if (globalData[prevYear]) {
                datasets.push({
                    label: prevYear,
                    data: prevData,
                    type: 'line',
                    borderColor: '#3b82f6', // var(--accent-blue)
                    backgroundColor: '#3b82f6',
                    borderWidth: 2,
                    pointBackgroundColor: '#3b82f6',
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    tension: 0.4, // Curva morbida
                    spanGaps: true // Collega i punti se ci sono buchi
                });
            }

            // Anno corrente (Barre)
            datasets.push({
                label: year,
                data: currentData,
                type: 'bar',
                backgroundColor: '#f59e0b', // var(--accent-yellow)
                borderRadius: 4,
                barPercentage: 0.6,
            });

            chartInstance = new Chart(ctx, {
                data: {
                    labels: MONTHS,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: false // Usiamo la nostra legenda custom in HTML
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            borderColor: '#334155',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6,
                            usePointStyle: true,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += formatNumber(context.parsed.y) + ' arrivi';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false,
                            },
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 11 }
                            }
                        },
                        y: {
                            grid: {
                                color: '#1e293b', // Linee di griglia molto scure
                                drawBorder: false,
                            },
                            ticks: {
                                color: '#94a3b8',
                                font: { size: 11 },
                                maxTicksLimit: 6,
                                callback: function(value) {
                                    if(value === 0) return '0';
                                    let suffix = value >= 1e6 ? 'M' : value >= 1e3 ? 'K' : '';
                                    let shortVal = value >= 1e6 ? value / 1e6 : value >= 1e3 ? value / 1e3 : value;
                                    return shortVal + suffix;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Avvio
        init();
    </script>
</body>
  </html>
